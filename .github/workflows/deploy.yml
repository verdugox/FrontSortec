name: Deploy to Azure Web App

on:
  push:
    branches:
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install Dependencies (without node_modules cache)
        run: npm ci
        working-directory: sortec

      - name: Build Project
        run: npm run build
        working-directory: sortec

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: "sortsortech"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: sortec/.next
