name: Deploy to Azure Web App

on:
  push:
    branches:
      - develop  # Se ejecuta cuando hay cambios en develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Use Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: sortec/package-lock.json

      # Habilitar Cache de Dependencias para acelerar la instalación
      - name: Cache Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies (Usando Cache si es posible)
        run: npm ci
        working-directory: sortec

      - name: Build Project
        run: npm run build
        working-directory: sortec

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Environment Variables in Azure Web App
        run: |
          az webapp config appsettings set --resource-group SorTectGroup --name sortsortech --settings \
          PORT=3000 \
          WEBSITE_RUN_FROM_PACKAGE=1 \
          SCM_DO_BUILD_DURING_DEPLOYMENT=true \
          STARTUP_COMMAND="npm start" \
          CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }} \
          CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }} \
          CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }} \
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }} \
          NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET=${{ secrets.NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET }}

      - name: Restart Azure Web App
        run: az webapp restart --resource-group SorTectGroup --name sortsortech

      # Empaquetado optimizado: Excluir archivos innecesarios
      - name: Build and Package Application
        run: zip -r app.zip . -x "node_modules/*" ".git/*" ".github/*"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: "sortsortech"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: app.zip
