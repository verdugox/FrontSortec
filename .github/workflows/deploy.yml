name: Deploy to Azure Web App

on:
  push:
    branches:
      - develop  # Se ejecuta cuando hay cambios en develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Use Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: sortec/package-lock.json

      - name: Install Dependencies
        run: |
          rm -rf node_modules
          npm ci --force
        working-directory: sortec

      - name: Verify Dependencies
        run: ls -la node_modules/.bin
        working-directory: sortec

      - name: Build Project
        run: npm run build
        working-directory: sortec

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: "sortsortech"
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: sortec
